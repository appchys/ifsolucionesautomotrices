# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  - variable: GOOGLE_GMAIL_APP_ORIGIN
    value: https://ifsolucionesautomotrices.web.app
    availability:
      - RUNTIME
  - variable: GOOGLE_GMAIL_REDIRECT_URI
    value: https://ifsolucionesautomotrices.web.app/api/gmail/callback
    availability:
      - RUNTIME
  - variable: GOOGLE_GMAIL_CLIENT_ID
    value: 239117748860-9es680vanfa132etutqj5hnibo99r4mc.apps.googleusercontent.com
    availability:
      - RUNTIME
  - variable: GOOGLE_GMAIL_CLIENT_SECRET
    secret: googleGmailClientSecret
    availability:
      - RUNTIME

  # Grant access to secrets in Cloud Secret Manager.
  # You can create secrets with the CLI command `firebase apphosting:secrets:set <secretName>`.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef
